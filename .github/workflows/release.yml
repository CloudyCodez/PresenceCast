name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        shell: pwsh
        run: python -m pip install --upgrade pip; python -m pip install -r requirements.txt

      - name: Inject Release Config
        shell: pwsh
        env:
          PRESENCECAST_CLIENT_ID: ${{ secrets.PRESENCECAST_CLIENT_ID }}
        run: |
          if (-not $env:PRESENCECAST_CLIENT_ID) {
            throw "Missing GitHub secret: PRESENCECAST_CLIENT_ID"
          }
          @"
          {
            "client_id": "$env:PRESENCECAST_CLIENT_ID",
            "large_image_key": "chibi_cloud",
            "large_image_text": "PresenceCast by Cloud",
            "small_image_key": "chibi_cloud",
            "small_image_text": "PresenceCast by Cloud",
            "playing_image_key": "chibi_cloud_playing",
            "playing_image_text": "PresenceCast | Playing",
            "listening_image_key": "chibi_cloud_listening",
            "listening_image_text": "PresenceCast | Listening",
            "watching_image_key": "chibi_cloud_watching",
            "watching_image_text": "PresenceCast | Watching",
            "competing_image_key": "",
            "competing_image_text": "PresenceCast | Competing",
            "emoji_asset_override": true
          }
          "@ | Set-Content -LiteralPath "config.json" -Encoding utf8

      - name: Generate Icon
        shell: pwsh
        run: python generate_icon.py

      - name: Build Executable
        shell: pwsh
        run: python -m PyInstaller --noconfirm --onefile --windowed --add-data "config.json;." --add-data "presencecast.ico;." --add-data "presencecast.png;." --add-data "chibi_cloud.png;." --add-data "Chibi Cloud Playing.png;." --add-data "Chibi Cloud Listening.png;." --add-data "Chibi Cloud Watching.png;." --icon presencecast.ico --name PresenceCast app.py

      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PresenceCast-windows
          path: dist/PresenceCast.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view ${{ github.ref_name }} *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create ${{ github.ref_name }} --generate-notes --latest
          }
          gh release upload ${{ github.ref_name }} dist/PresenceCast.exe --clobber
